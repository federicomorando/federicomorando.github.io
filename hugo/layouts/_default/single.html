{{ define "main" }}
<article>
  <h1>{{ .Title }}</h1>
  <p class="meta">
    {{ with .Date }}{{ .Format "2006-01-02" }}{{ end }}
    {{ with .Params.author }} | {{ . }}{{ end }}
  </p>
  {{ with .Params.categories }}
  <p class="meta">Categorie: {{ delimit . ", " }}</p>
  {{ end }}
  {{ with .Params.tags }}
  <p class="meta">Tag: {{ delimit . ", " }}</p>
  {{ end }}
  <div class="content">{{ .Content }}</div>
</article>
{{ end }}
